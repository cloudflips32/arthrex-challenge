<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#46ACC2"/>
      <stop offset="45%" style="stop-color:#498C8A"/>
      <stop offset="100%" style="stop-color:#4D4730"/>
    </linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#fff" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#dots)"/>
  <circle cx="980" cy="120" r="180" fill="#fff" opacity="0.06"/>
  <circle cx="200" cy="620" r="220" fill="#fff" opacity="0.05"/>
  <!-- Stylized hospital + medical cross (decorative) -->
  <g transform="translate(640 200)" opacity="0.9">
    <rect x="-120" y="-40" width="240" height="160" rx="12" fill="#fff" opacity="0.15"/>
    <rect x="-100" y="-20" width="40" height="100" rx="4" fill="#fff" opacity="0.35"/>
    <rect x="-20" y="-20" width="40" height="100" rx="4" fill="#fff" opacity="0.35"/>
    <rect x="40" y="-20" width="40" height="100" rx="4" fill="#fff" opacity="0.35"/>
    <rect x="-30" y="50" width="60" height="50" rx="4" fill="#fff" opacity="0.25"/>
    <g transform="translate(0 -95)">
      <rect x="-14" y="-28" width="28" height="56" rx="4" fill="#fff" opacity="0.85"/>
      <rect x="-28" y="-14" width="56" height="28" rx="4" fill="#fff" opacity="0.85"/>
    </g>
  </g>
  <text x="640" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="38" font-weight="700" fill="#fff">Your care team</text>
  <text x="640" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#fff" opacity="0.92">Hospital · Nursing · Physicians</text>
  <text x="640" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="#fff" opacity="0.95">Tap play to begin</text>
</svg>
